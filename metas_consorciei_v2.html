<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acompanhamento de Metas — 1º Semestre 2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:       #0F1E3C;
    --cyan:       #4FC3C3;
    --white:      #FFFFFF;
    --bg:         #F0F3F9;
    --border:     #DDE3EE;
    --green:      #0E9E5B;  --green-bg:  #E6F7EF;
    --orange:     #D97706;  --orange-bg: #FEF3E2;
    --blue:       #2563EB;  --blue-bg:   #EEF4FF;
    --gray:       #8A96AB;  --gray-light:#F4F6FA;
    --text:       #1A2540;  --text-muted:#5A6478;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ── SELECTOR BAR ── */
  .selector-bar {
    background: #07111F;
    padding: 0 40px;
    display: flex;
    align-items: center;
    gap: 6px;
    height: 44px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .selector-bar::-webkit-scrollbar { display: none; }
  .selector-label {
    font-size: 10px;
    font-weight: 700;
    color: rgba(255,255,255,0.35);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-right: 10px;
    white-space: nowrap;
  }
  .sel-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    color: rgba(255,255,255,0.45);
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.09);
    border-radius: 20px;
    padding: 4px 13px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .sel-btn:hover { color: rgba(255,255,255,0.85); background: rgba(255,255,255,0.11); }
  .sel-btn.active { color: var(--navy); background: var(--cyan); border-color: var(--cyan); font-weight: 600; }

  /* ── HEADER ── */
  .header {
    background: var(--navy);
    padding: 0 40px;
    display: flex;
    align-items: stretch;
    min-height: 64px;
    position: sticky;
    top: 44px;
    z-index: 99;
    box-shadow: 0 2px 20px rgba(0,0,0,0.22);
  }
  .header-left {
    display: flex; flex-direction: column; justify-content: center;
    padding: 10px 26px 10px 0;
    border-right: 1px solid rgba(255,255,255,0.1);
    min-width: 190px;
  }
  .header-semestre { font-size: 10px; font-weight: 600; color: var(--cyan); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 2px; }
  .header-title    { font-size: 18px; font-weight: 700; color: var(--white); }
  .header-tabs     { display: flex; align-items: flex-end; gap: 2px; padding: 0 20px; flex: 1; }
  .tab-btn {
    font-family: 'DM Sans', sans-serif; font-size: 12.5px; font-weight: 500;
    color: rgba(255,255,255,0.45); background: none; border: none;
    border-bottom: 3px solid transparent; padding: 20px 14px 14px;
    cursor: pointer; transition: all 0.16s; white-space: nowrap;
  }
  .tab-btn:hover { color: rgba(255,255,255,0.8); }
  .tab-btn.active { color: var(--white); border-bottom-color: var(--cyan); }
  .header-right {
    display: flex; flex-direction: column; justify-content: center; align-items: flex-end;
    padding: 10px 0 10px 22px;
    border-left: 1px solid rgba(255,255,255,0.1);
    min-width: 185px;
  }
  .header-role { font-size: 10px; font-weight: 600; color: var(--cyan); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 2px; }
  .header-name { font-size: 17px; font-weight: 700; color: var(--white); }

  /* ── CONTAINER ── */
  .container { max-width: 1280px; margin: 0 auto; padding: 26px 36px 60px; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }
  .manager-view { display: none; }
  .manager-view.active { display: block; }

  /* ── SUMMARY BAR ── */
  .summary-bar {
    display: flex; background: var(--white); border-radius: 10px;
    border: 1px solid var(--border); box-shadow: 0 1px 4px rgba(15,30,60,0.06);
    overflow: hidden; margin-bottom: 18px;
  }
  .summary-item { flex: 1; padding: 13px 18px; border-right: 1px solid var(--border); text-align: center; }
  .summary-item:last-child { border-right: none; }
  .summary-num   { font-size: 24px; font-weight: 700; line-height: 1; margin-bottom: 3px; }
  .summary-label { font-size: 10px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-muted); }
  .summary-pct   { font-size: 12px; font-weight: 400; opacity: 0.6; margin-left: 2px; }
  .num-total    { color: var(--navy); }
  .num-avancada { color: var(--green); }
  .num-ontrack  { color: var(--blue); }
  .num-atrasada { color: var(--orange); }

  /* ── DIVIDERS ── */
  .section-label {
    font-size: 10.5px; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase;
    color: var(--text-muted); margin: 26px 0 13px;
    display: flex; align-items: center; gap: 10px;
  }
  .section-label::after { content:''; flex:1; height:1px; background:var(--border); }

  .con-divider { display: flex; align-items: center; gap: 12px; margin: 28px 0 14px; }
  .con-divider-line { flex:1; height:2px; background:var(--border); }
  .con-divider-pill {
    font-size: 10.5px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
    padding: 4px 14px; border-radius: 20px; white-space: nowrap;
  }
  .pill-gerais      { background: var(--navy); color: var(--white); }
  .pill-especificas { background: var(--cyan); color: var(--navy); }

  /* ── TABLE ── */
  .goals-table {
    width: 100%; border-collapse: collapse; background: var(--white);
    border-radius: 10px; overflow: hidden;
    box-shadow: 0 1px 3px rgba(15,30,60,0.07), 0 4px 14px rgba(15,30,60,0.04);
    margin-bottom: 6px;
  }
  .goals-table thead tr { background: var(--navy); }
  .goals-table thead th {
    padding: 10px 13px; font-size: 10.5px; font-weight: 600;
    color: rgba(255,255,255,0.6); letter-spacing: 1.2px; text-transform: uppercase;
    text-align: center; white-space: nowrap;
  }
  .goals-table thead th.col-meta { text-align: left; }
  .goals-table thead th.cur { background: rgba(79,195,195,0.18); color: var(--cyan); }
  .goals-table thead th.fut { opacity: 0.38; }

  .goals-table tbody tr.goal-row { border-bottom: 1px solid var(--border); transition: background 0.12s; }
  .goals-table tbody tr.goal-row:hover { background: #f8fafd; }
  .goals-table tbody tr.goal-row:last-child { border-bottom: none; }
  .goals-table td { padding: 12px 13px; vertical-align: middle; }

  .meta-text { font-size: 13px; font-weight: 500; color: var(--text); line-height: 1.45; }

  /* Tags */
  .tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 5px; }
  .tag  { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 4px; letter-spacing: 0.3px; }
  .tag-cx           { background:#E0F8F4; color:#0E9080; }
  .tag-gestao       { background:#F8F4EC; color:#92400E; }
  .tag-fundos       { background:#F3EEFF; color:#7C3AED; }
  .tag-performance  { background:#FFF0E8; color:#C05621; }
  .tag-transferencia{ background:#EEF4FF; color:#2563EB; }
  .tag-secundario   { background:#EEF4FF; color:#1D4ED8; }
  .tag-plataforma   { background:#F0FFFE; color:#0F766E; }
  .tag-vendas       { background:#FFF7ED; color:#C2410C; }
  .tag-contempladas { background:#FAF5FF; color:#7E22CE; }
  .tag-financas     { background:#F0FDF4; color:#166534; }
  .tag-pessoas      { background:#FFF1F2; color:#9F1239; }
  .tag-inovacao     { background:#F5F3FF; color:#5B21B6; }
  .tag-juridico     { background:#F1F5F9; color:#334155; }
  .tag-design       { background:#FDE8F0; color:#BE185D; }
  .tag-novos        { background:#ECFDF5; color:#065F46; }

  /* Month cells */
  .mc { text-align:center; font-family:'DM Mono',monospace; font-size:12px; font-weight:500; min-width:74px; }
  .mc.empty { color:var(--border); font-size:15px; background:#fafbfd; }
  .mc.tbd   { color:var(--gray); font-size:11px; font-weight:600; letter-spacing:1px; }
  .mc.txtfree { font-family:'DM Sans',sans-serif; font-size:11px; color:var(--text-muted); line-height:1.4; text-align:left; max-width:180px; }
  .vl { display:block; line-height:1.55; }
  .vo { color:var(--orange); } .vb { color:var(--blue); } .vg { color:var(--green); } .vz { color:var(--gray); font-size:11px; }

  /* Status */
  .sc { text-align:center; min-width:52px; }
  .si { display:inline-flex; align-items:center; justify-content:center; width:27px; height:27px; border-radius:50%; font-size:13px; }
  .s-av { background:var(--green-bg);  color:var(--green); }
  .s-on { background:var(--blue-bg);   color:var(--blue); }
  .s-at { background:var(--orange-bg); color:var(--orange); }

  .empty-metas {
    background: var(--white); border-radius:10px; border:1px solid var(--border);
    padding:20px; text-align:center; color:var(--gray); font-size:13px; margin-bottom:6px;
    font-style: italic;
  }

  @media(max-width:900px){
    .selector-bar,.header { padding:0 16px; }
    .container { padding:18px 14px 40px; }
  }
</style>
</head>

//  ENGINE — não editar abaixo

const TAG_LABEL = {
  cx:"CX", gestao:"Gestão", fundos:"Gestão de Fundos", performance:"Performance",
  transferencia:"Transferência", secundario_h:"Squad Secundário", secundario_l:"Squad Secundário",
  plataforma:"Squad Plataforma", contempladas:"Squad Contempladas", vendas:"Squad Vendas",
  financas:"Finanças", pessoas:"Pessoas", inovacao:"Inovação",
  gestao_joao:"Gestão", juridico:"Jurídico", design:"Design", novos:"Novos Negócios",
};
const TAG_CLS = {
  cx:"tag-cx", gestao:"tag-gestao", fundos:"tag-fundos", performance:"tag-performance",
  transferencia:"tag-transferencia", secundario_h:"tag-secundario", secundario_l:"tag-secundario",
  plataforma:"tag-plataforma", contempladas:"tag-contempladas", vendas:"tag-vendas",
  financas:"tag-financas", pessoas:"tag-pessoas", inovacao:"tag-inovacao",
  gestao_joao:"tag-gestao", juridico:"tag-juridico", design:"tag-design", novos:"tag-novos",
};
const S_MAP = {
  avancada:{ icon:"⚡", cls:"s-av", label:"Avançada" },
  ontrack: { icon:"◑",  cls:"s-on", label:"On Track" },
  atrasada:{ icon:"⚠",  cls:"s-at", label:"Atrasada" },
};

function sIcon(s){ const st=S_MAP[s]||S_MAP.atrasada; return `<div class="si ${st.cls}" title="${st.label}">${st.icon}</div>`; }
function tagHtml(times){ return (times||[]).map(t=>`<span class="tag ${TAG_CLS[t]||''}">${TAG_LABEL[t]||t}</span>`).join(""); }

function valCls(v){
  if(!v||v==="—") return "vz";
  if(v==="TBD") return "vz";
  if(v.startsWith("+")) return "vo";
  if(v==="0%"||v.startsWith("0%/")) return "vo";
  return "vb";
}

function cell(val, idx, free){
  const fut = idx >= MES_ATUAL;
  if(val===null||val===undefined) return `<td class="mc empty${fut?' fut':''}">—</td>`;
  if(val==="TBD") return `<td class="mc tbd">TBD</td>`;
  if(free) return `<td class="mc txtfree">${val}</td>`;
  const lines=val.split("\n");
  return `<td class="mc">${lines.map(l=>`<span class="vl ${valCls(l)}">${l}</span>`).join("")}</td>`;
}

function mHeaders(){
  return MESES.map((m,i)=>{
    const cur=i===MES_ATUAL-1, fut=i>=MES_ATUAL;
    const lbl=cur?`${MESES_LABEL[i]}<sub style="font-size:8px;margin-left:2px;opacity:.7">Acum</sub>`:MESES_LABEL[i];
    return `<th class="${cur?'cur':''}${fut?' fut':''}">${lbl}</th>`;
  }).join("");
}

function countS(metas){
  const c={total:metas.length,avancada:0,ontrack:0,atrasada:0};
  metas.forEach(m=>{if(c[m.status]!==undefined)c[m.status]++;});
  return c;
}

function summaryBar(metas){
  const c=countS(metas);
  const p=k=>c.total?Math.round(c[k]/c.total*100):0;
  return `<div class="summary-bar">
    <div class="summary-item"><div class="summary-num num-total">${c.total}</div><div class="summary-label">Total</div></div>
    <div class="summary-item"><div class="summary-num num-avancada">${c.avancada}<span class="summary-pct">(${p('avancada')}%)</span></div><div class="summary-label">⚡ Avançadas</div></div>
    <div class="summary-item"><div class="summary-num num-ontrack">${c.ontrack}<span class="summary-pct">(${p('ontrack')}%)</span></div><div class="summary-label">◑ On Track</div></div>
    <div class="summary-item"><div class="summary-num num-atrasada">${c.atrasada}<span class="summary-pct">(${p('atrasada')}%)</span></div><div class="summary-label">⚠ Atrasadas</div></div>
  </div>`;
}

function table(metas, timesFilter){
  // timesFilter: array de chaves dos times do gerente — mostra só essas tags.
  // null = sem tags.
  if(!metas.length) return `<div class="empty-metas">Sem metas cadastradas</div>`;
  const rows=metas.map(g=>{
    let tagsEl = "";
    if(timesFilter && g.times && g.times.length){
      const filtered = g.times.filter(t => timesFilter.includes(t));
      if(filtered.length) tagsEl = `<div class="tags">${tagHtml(filtered)}</div>`;
    }
    return `<tr class="goal-row">
      <td><div class="meta-text">${g.meta}</div>${tagsEl}</td>
      ${MESES.map((m,i)=>cell(g.valores[m],i,g.textoLivre)).join("")}
      <td class="sc">${sIcon(g.status)}</td>
    </tr>`;
  }).join("");
  return `<table class="goals-table"><thead><tr>
    <th class="col-meta">Meta</th>${mHeaders()}<th>Status</th>
  </tr></thead><tbody>${rows}</tbody></table>`;
}

function getMetasGerais(keys){
  return (keys||[]).map(k=>METAS_GERAIS_POOL[k]).filter(Boolean);
}

function divider(tipo){
  const pill=tipo==="gerais"
    ?`<div class="con-divider-pill pill-gerais">Metas Gerais</div>`
    :`<div class="con-divider-pill pill-especificas">Metas de Time</div>`;
  return `<div class="con-divider"><div class="con-divider-line"></div>${pill}<div class="con-divider-line"></div></div>`;
}

// Coleta todas as metas gerais únicas de todos os times do gerente
function allMetasGerais(g){
  const seen=new Set(), result=[];
  (g.times||[]).forEach(t=>{
    (t.metas_gerais_keys||[]).forEach(k=>{
      if(!seen.has(k)){ seen.add(k); const m=METAS_GERAIS_POOL[k]; if(m) result.push(m); }
    });
  });
  return result;
}

function buildManager(g){
  if(g.modo==="single"){
    const t=g.times[0];
    const gerais=getMetasGerais(t.metas_gerais_keys);
    const indiv=t.metas_individuais||[];
    const todas=[...gerais,...indiv];
    const tFilter = t.metas_gerais_keys.length ? [t.chave] : null;
    return `${summaryBar(todas)}
      ${gerais.length?divider("gerais")+""+table(gerais,null):""}
      ${indiv.length?divider("especificas")+""+table(indiv,null):""}`;
  }

  // MULTI — 3 abas
  const allG=allMetasGerais(g);

  // Aba 1: todas as metas gerais
  const managerTimeKeys = g.times.map(t=>t.chave);
  const tab1=`${summaryBar(allG)}${table(allG,managerTimeKeys)}
    ${g.metas_individuais_gerente?`<div class="section-label">${g.label_ind_gerente||"Metas Individuais do Time"}</div>${summaryBar(g.metas_individuais_gerente)}${table(g.metas_individuais_gerente,null)}`:""}`;

  // Aba 2: metas individuais por time
  const tab2=g.times.map(t=>{
    const indiv=t.metas_individuais||[];
    return `<div class="section-label">${t.nome}</div>
      ${indiv.length?summaryBar(indiv)+table(indiv,null):`<div class="empty-metas">Sem metas individuais</div>`}`;
  }).join("")+
  (g.metas_individuais_gerente?`<div class="section-label">${g.label_ind_gerente||"Metas Individuais do Time"}</div>${summaryBar(g.metas_individuais_gerente)}${table(g.metas_individuais_gerente,null)}`:"");

  // Aba 3: consolidado por time
  const tab3=g.times.map(t=>{
    const gerais=getMetasGerais(t.metas_gerais_keys);
    const indiv=t.metas_individuais||[];
    const todas=[...gerais,...indiv];
    return `<div class="section-label">${t.nome}</div>
      ${summaryBar(todas)}
      ${gerais.length?divider("gerais")+table(gerais,null):""}
      ${indiv.length?divider("especificas")+table(indiv,null):""}`;
  }).join("");

  return `
    <div class="tab-panel active" id="${g.id}-t1">${tab1}</div>
    <div class="tab-panel"        id="${g.id}-t2">${tab2}</div>
    <div class="tab-panel"        id="${g.id}-t3">${tab3}</div>`;
}

function switchTab(gId, n){
  [1,2,3].forEach(i=>{
    const el=document.getElementById(`${gId}-t${i}`);
    if(el) el.classList.toggle("active", i===n);
  });
  document.querySelectorAll(`#view-${gId} .tab-btn`).forEach((b,i)=>b.classList.toggle("active",i===n-1));
}

function switchManager(id){
  document.querySelectorAll(".manager-view").forEach(v=>v.classList.remove("active"));
  document.querySelectorAll(".sel-btn").forEach(b=>b.classList.remove("active"));
  const view=document.getElementById(`view-${id}`);
  if(view) view.classList.add("active");
  const btn=document.getElementById(`sel-${id}`);
  if(btn) btn.classList.add("active");
}

document.addEventListener("DOMContentLoaded",()=>{
  const selBar=document.getElementById("sel-bar");
  const views =document.getElementById("manager-views");
  const headerTabs=document.getElementById("header-tabs");

  GERENTES.forEach((g,gi)=>{
    // Selector pill
    const pill=document.createElement("button");
    pill.className="sel-btn"+(gi===0?" active":"");
    pill.id=`sel-${g.id}`;
    pill.textContent=g.nome.split(" ")[0]; // primeiro nome
    pill.onclick=()=>switchManager(g.id);
    selBar.appendChild(pill);

    // Manager view
    const view=document.createElement("div");
    view.className="manager-view"+(gi===0?" active":"");
    view.id=`view-${g.id}`;

    // Header info via data attrs
    view.dataset.nome=g.nome;
    view.dataset.cargo=g.cargo;
    view.dataset.modo=g.modo;

    if(g.modo==="multi"){
      view.innerHTML=buildManager(g);
    } else {
      view.innerHTML=buildManager(g);
    }
    views.appendChild(view);
  });

  // Header reactive
  const hName =document.getElementById("h-name");
  const hRole =document.getElementById("h-role");
  const hTabs =document.getElementById("header-tabs");

  function updateHeader(g){
    hName.textContent=g.nome;
    hRole.textContent=g.cargo;
    hTabs.innerHTML="";
    if(g.modo==="multi"){
      ["Metas Gerais","Metas de Time","Consolidado por Time"].forEach((lbl,i)=>{
        const b=document.createElement("button");
        b.className="tab-btn"+(i===0?" active":"");
        b.textContent=lbl;
        b.onclick=()=>switchTab(g.id,i+1);
        hTabs.appendChild(b);
      });
    } else {
      const sp=document.createElement("span");
      sp.style.cssText="color:rgba(255,255,255,0.45);font-size:13px;align-self:center;padding-left:4px;";
      sp.textContent="Visão Consolidada";
      hTabs.appendChild(sp);
    }
  }

  // Patch switchManager to also update header
  window._switchManager=switchManager;
  window.switchManager=function(id){
    _switchManager(id);
    const g=GERENTES.find(x=>x.id===id);
    if(g) updateHeader(g);
  };

  updateHeader(GERENTES[0]);
});
</script>
